# ============================================================
# XCOINGATEWAY — NGINX REVERSE PROXY (ZONE 1)
# ============================================================
#
# This is the ONLY internet-facing component.
# All traffic enters here and is proxied to the api-server.
#
# SECURITY:
#   - TLS 1.2+ only (TLS 1.3 preferred)
#   - HSTS with preload
#   - IP-level rate limiting (before any application logic)
#   - Request size limits matching app.js body parser limits
#   - X-Request-ID injection for distributed tracing
#   - Security headers (XSS, clickjacking, CSP, MIME sniffing)
#   - Path allowlisting — only /api/* and /pay/* are routed
#
# UPSTREAM PORTS:
#   api-server:  3000 (app)
#
# INTERNAL HEALTH:
#   /health → 200 (for Docker health checks, not public)
# ============================================================

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ─── Core Settings ─────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # ─── Logging ───────────────────────────────────────────────────────────
    log_format xcg_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log xcg_json;
    error_log  /var/log/nginx/error.log warn;

    # ─── Rate Limiting Zones ───────────────────────────────────────────────
    # Pre-auth IP-level limits — volumetric brute-force protection
    # These run BEFORE any application logic (HMAC, nonce, DB lookup)

    # Auth routes: 20 req/5min per IP (strict — matches app ipAuthLimiter)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=4r/m;

    # API routes: 120 req/min per IP (matches app ipMerchantLimiter)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

    # General: 300 req/min per IP (matches app ipGeneralLimiter)
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=5r/s;

    # Rate limit response
    limit_req_status 429;
    limit_req_log_level warn;

    # ─── Request Size Limits ───────────────────────────────────────────────
    # Default: 32KB (matches app.js general fallback)
    client_max_body_size 32k;

    # Block oversized headers (WAF Layer 1)
    large_client_header_buffers 4 8k;

    # ─── Connection Limits ─────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── X-Request-ID Mapping ──────────────────────────────────────────────
    # MUST be in http{} context (NOT inside server{})
    # If client sends X-Request-ID, use it. Otherwise Nginx generates one.
    map $http_x_request_id $request_id_final {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ─── Upstream ──────────────────────────────────────────────────────────
    upstream api_server {
        # Docker Compose service name resolves to container IP
        server xcg-api-server:3000;

        # Future: add more instances for horizontal scaling
        # server xcg-api-server-2:3000;

        keepalive 32;  # Persistent connections to upstream
    }

    # ─── HTTP → HTTPS Redirect ─────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Docker health check (internal only)
        location = /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;  # Replace with actual domain in production

        # ── TLS Configuration ──────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # TLS 1.2+ only (1.3 preferred)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Security Headers ──────────────────────────────────────────────
        # HSTS: force HTTPS for 1 year with preload
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;
        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # XSS protection
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP: restrict content sources
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
        # Permissions policy
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── X-Request-ID ──────────────────────────────────────────────────
        # Map defined in http{} context above — $request_id_final is available here

        # ── Connection Limit ──────────────────────────────────────────────
        limit_conn conn_limit 50;  # Max 50 concurrent connections per IP

        # ── Block Suspicious Paths ────────────────────────────────────────
        # Block common scanner paths before they hit the app
        location ~ ^/(\.env|\.git|wp-admin|wp-login|phpmyadmin|admin|cgi-bin) {
            return 444;  # Drop connection silently
        }

        # ── API Routes ────────────────────────────────────────────────────

        # Auth routes — strictest rate limit
        location /api/v1/auth {
            limit_req zone=auth_limit burst=5 nodelay;
            client_max_body_size 8k;

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    15s;
        }

        # Invoice creation — moderate rate limit, small body
        location /api/v1/payments {
            limit_req zone=api_limit burst=20 nodelay;
            client_max_body_size 16k;

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        # Withdrawals — moderate rate limit, smallest body
        location /api/v1/withdrawals {
            limit_req zone=api_limit burst=10 nodelay;
            client_max_body_size 4k;

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        # Admin routes — larger body (bulk imports), general rate limit
        location /api/v1/admin {
            limit_req zone=general_limit burst=30 nodelay;
            client_max_body_size 256k;

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;

            proxy_connect_timeout 5s;
            proxy_send_timeout    15s;
            proxy_read_timeout    30s;
        }

        # Merchant portal
        location /api/v1/merchant-portal {
            limit_req zone=api_limit burst=20 nodelay;
            client_max_body_size 16k;

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        # General API catch-all
        location /api/ {
            limit_req zone=general_limit burst=30 nodelay;
            client_max_body_size 32k;

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        # Public payment page (proxied to api-server which serves static)
        location /pay/ {
            limit_req zone=general_limit burst=50 nodelay;
            client_max_body_size 4k;

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;
        }

        # ── Block everything else ─────────────────────────────────────────
        location / {
            return 404;
        }

        # ── Internal health check endpoints (NOT proxied to public) ───────
        # These are only accessible within the Docker network
        location /internal/ {
            return 404;  # Block external access to internal endpoints
        }
    }
}
